<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognitive Psychology Quiz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
    :root {
      --bg: #d8a7a7;
      --surface: rgba(255, 255, 255, 0.25);
      --surface2: rgba(255, 255, 255, 0.45);
      --accent: #111111;
      --text: #1a1a1a;
      --muted: #4f3b3b;
      --correct: #6a8d73;
      --wrong: #b56c6c;
      --border: rgba(255, 255, 255, 0.3);
      --glow: rgba(17, 17, 17, 0.1);
    }
    h1, .subtitle { color: #fff !important; }
    .tc, .qcard, .opt, .rcard, .expl, .sbox, .ri {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      cursor: none !important;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .noise-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 50;
      mix-blend-mode: overlay; opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.8%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E");
    }
    body { cursor: none; }
    .custom-cursor {
      position: fixed; top: 0; left: 0; width: 32px; height: 32px;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.5);
      mix-blend-mode: difference; pointer-events: none; z-index: 100;
      transform: translate(-50%, -50%); will-change: transform;
    }
    .custom-cursor-dot {
      position: fixed; top: 0; left: 0; width: 4px; height: 4px;
      background: white; border-radius: 50%;
      mix-blend-mode: difference; pointer-events: none; z-index: 100;
      transform: translate(-50%, -50%); will-change: transform;
    }
    .blob-bg-container {
      position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
    }
    .blob-blur-layer {
      position: absolute; inset: 0; filter: blur(80px);
    }
    .fluid-blob {
      position: absolute; mix-blend-mode: multiply; opacity: 0.8; will-change: transform;
    }
    .fluid-blob.b1 { width: 45vw; height: 45vw; background: black; top: -20%; left: -20%; border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    .fluid-blob.b2 { width: 35vw; height: 35vw; background: #1a1a1a; top: 10%; left: 40%; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    .fluid-blob.b3 { width: 40vw; height: 50vw; background: rgba(0,0,0,0.9); top: 30%; left: 10%; border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    .fluid-blob.b4 { width: 50vw; height: 40vw; background: rgba(0,0,0,0.8); top: 60%; left: 50%; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    .fluid-blob.b5 { width: 60vw; height: 60vw; background: black; top: 50%; left: -10%; border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }

    .screen {
      position: relative;
      z-index: 1;
    }

    #home,
    #quiz,
    #result {
      display: none;
      min-height: 100vh;
    }

    #home.active,
    #quiz.active,
    #result.active {
      display: flex;
    }

    /* HOME */
    #home {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo-icon {
      display: flex;
      justify-content: center;
      margin-bottom: .5rem;
      filter: drop-shadow(0 0 20px rgba(0,0,0,0.1));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 500;
      color: #111;
      line-height: 1.1;
      margin-bottom: .5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .mode-toggle {
      display: flex;
      gap: .5rem;
      margin-bottom: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: .3rem;
      max-width: 360px;
    }

    .mode-btn {
      flex: 1;
      padding: .65rem 1.4rem;
      border: none;
      border-radius: 50px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      background: transparent;
      color: var(--muted);
    }

    .mode-btn.active {
      background: #111;
      color: #fff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .mode-btn:hover:not(.active) {
      color: var(--text);
    }

    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      max-width: 900px;
      width: 100%;
      margin-bottom: 2rem;
    }

    .tc {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      cursor: pointer;
      transition: all .3s;
    }

    .tc:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px var(--glow);
    }

    .tc.sel {
      border-color: var(--accent);
      background: #111;
      color: #fff;
      box-shadow: 0 0 20px var(--glow);
    }
    .tc.sel .tq { color: rgba(255,255,255,0.7); }
    .tc.sel .tn, .tc.sel .ti i { color: #fff; }

    .tc .ti {
      font-size: 1.8rem;
      margin-bottom: .4rem;
    }

    .tc .tn {
      font-weight: 600;
      font-size: .9rem;
    }

    .tc .tq {
      color: var(--muted);
      font-size: .78rem;
      margin-top: .2rem;
    }

    .settings-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
      max-width: 600px;
      width: 100%;
    }

    .sg {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .sg label {
      font-size: .82rem;
      color: var(--muted);
    }

    .sg select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .5rem 1rem;
      border-radius: 8px;
      font-size: .9rem;
      cursor: pointer;
      outline: none;
    }

    .sg select:focus {
      border-color: var(--accent);
    }

    .btn-start {
      background: #111;
      color: #fff;
      border: none;
      padding: 1rem 3rem;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: all .3s;
      box-shadow: 0 4px 20px var(--glow);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--glow);
    }

    /* QUIZ */
    #quiz {
      flex-direction: column;
      padding: 1.5rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .qhdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: .5rem;
    }

    .qmeta {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: .4rem .9rem;
      border-radius: 20px;
      font-size: .82rem;
      color: var(--muted);
    }

    .badge span {
      color: var(--text);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    
    .badge span svg {
      width: 1.2em;
      height: 1.2em;
    }

    .tbadge {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: .4rem .9rem;
      border-radius: 20px;
      font-size: .9rem;
      font-weight: 700;
      transition: all .3s;
    }

    .tbadge.warn {
      border-color: #fdcb6e;
      color: #fdcb6e;
    }

    .tbadge.danger {
      border-color: var(--wrong);
      color: var(--wrong);
      animation: pulse .5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }

    .pbwrap {
      background: var(--surface);
      border-radius: 10px;
      height: 6px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .pb {
      height: 100%;
      background: #111;
      border-radius: 10px;
      transition: width .4s ease;
    }

    .qcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }


    .qtopic {
      font-size: .72rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: .8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .qtext {
      font-size: 1.1rem;
      line-height: 1.6;
      font-weight: 500;
    }

    .opts {
      display: grid;
      gap: .8rem;
      margin-bottom: 1.5rem;
    }

    .opt {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: .9rem 1.1rem;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-size: .92rem;
      transition: all .25s;
      display: flex;
      align-items: center;
      gap: .8rem;
      line-height: 1.4;
    }

    .opt:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      transform: translateX(4px);
    }

    .ol {
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .78rem;
      flex-shrink: 0;
      transition: all .25s;
    }

    .opt:hover:not(:disabled) .ol {
      background: transparent;
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }

    .opt.correct {
      border-color: var(--correct);
      background: rgba(106, 141, 115, 0.25);
    }

    .opt.correct .ol {
      background: var(--correct);
      border-color: var(--correct);
      color: #fff;
    }

    .opt.wrong {
      border-color: var(--wrong);
      background: rgba(181, 108, 108, 0.25);
    }

    .opt.wrong .ol {
      background: var(--wrong);
      border-color: var(--wrong);
      color: #fff;
    }

    .opt:disabled {
      cursor: default;
    }

    .expl {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: .88rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
      display: none;
    }

    .expl.show {
      display: block;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .qftr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .5rem;
    }

    .slive {
      font-size: .88rem;
      color: var(--muted);
    }

    .slive span {
      color: var(--correct);
      font-weight: 700;
    }

    .btn-next {
      background: #111;
      color: #fff;
      border: none;
      padding: .7rem 2rem;
      border-radius: 50px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      display: none;
    }

    .btn-next.show {
      display: block;
    }

    .btn-next:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px var(--glow);
    }

    /* RESULT */
    #result {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .rcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 640px;
      width: 100%;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .rcard::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #111;
    }

    .remoji {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: bounce .6s ease;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    .rtitle {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: .5rem;
    }

    .rsub {
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .scircle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      position: relative;
    }

    .scircle::before {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: var(--surface);
    }

    .sinner {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .spct {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
    }

    .slbl {
      font-size: .72rem;
      color: var(--muted);
    }

    .sgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .sbox {
      background: var(--surface2);
      border-radius: 12px;
      padding: 1rem;
    }

    .sval {
      font-size: 1.5rem;
      font-weight: 800;
    }

    .sval.g {
      color: var(--correct);
    }

    .sval.r {
      color: var(--wrong);
    }

    .sval.b {
      color: #74b9ff;
    }

    .slb {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .2rem;
    }

    .rbtns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .btn-retry {
      background: #111;
      color: #fff;
      border: none;
      padding: .8rem 2rem;
      border-radius: 50px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      box-shadow: 0 4px 15px var(--glow);
    }

    .btn-retry:hover {
      transform: translateY(-2px);
    }

    .btn-home {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: .8rem 2rem;
      border-radius: 50px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
    }

    .btn-home:hover {
      border-color: var(--accent);
    }

    .rev {
      margin-top: 1.5rem;
      text-align: left;
    }

    .rev-title {
      font-size: .85rem;
      font-weight: 700;
      margin-bottom: .8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .ri {
      background: var(--surface2);
      border-radius: 10px;
      padding: .9rem;
      margin-bottom: .7rem;
      border-left: 3px solid var(--border);
    }

    .ri.c {
      border-left-color: var(--correct);
    }

    .ri.w {
      border-left-color: var(--wrong);
    }

    .riq {
      font-size: .85rem;
      margin-bottom: .4rem;
    }

    .ria {
      font-size: .78rem;
      color: var(--muted);
    }

    .ria .ya {
      color: var(--wrong);
    }

    .ria .ca {
      color: var(--correct);
    }

    @media(max-width:600px) {
      .qtext {
        font-size: .98rem;
      }

      .opt {
        font-size: .85rem;
        padding: .75rem .9rem;
      }
    }
  </style>
</head>

<body>
  <!-- INJECTED FLUID AESTHETICS -->
  <div class="noise-overlay"></div>
  <div class="custom-cursor"></div>
  <div class="custom-cursor-dot"></div>
  <div class="blob-bg-container">
    <div class="blob-blur-layer">
      <div class="fluid-blob b1"></div>
      <div class="fluid-blob b2"></div>
      <div class="fluid-blob b3"></div>
      <div class="fluid-blob b4"></div>
      <div class="fluid-blob b5"></div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="screen active">
    <span class="logo-icon"><i data-lucide="brain-circuit" style="width:68px;height:68px;stroke-width:1.5;"></i></span>
    <h1>Cognitive Psychology Quiz</h1>
    <p class="subtitle">250 questions across 14 topics & 12 weeks of cognitive science</p>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-topic" onclick="setMode('topic')"><i data-lucide="book-open" style="width:16px;height:16px;margin-bottom:-2px"></i> By Topic</button>
      <button class="mode-btn" id="mode-week" onclick="setMode('week')"><i data-lucide="calendar" style="width:16px;height:16px;margin-bottom:-2px"></i> By Week</button>
    </div>
    <div class="topic-grid" id="topic-grid"></div>

    <button class="btn-start" onclick="startQuiz()">Start Quiz &#10022;</button>
  </div>
  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div class="qhdr">
      <div class="qmeta">
        <div class="badge">Q <span id="qc">1</span> / <span id="qt">20</span></div>
        <div class="badge">Topic: <span id="qtopic">-</span></div>
      </div>
      <div class="tbadge" id="tdisp" style="display:none"></div>
    </div>
    <div class="pbwrap">
      <div class="pb" id="pb" style="width:0%"></div>
    </div>
    <div class="qcard">
      <div class="qtopic" id="qlabel"></div>
      <div class="qtext" id="qtext"></div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="expl" id="expl"></div>
    <div class="qftr">
      <div class="slive">Score: <span id="lscore">0</span> correct</div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">Next &#8594;</button>
    </div>
  </div>
  <!-- RESULT -->
  <div id="result" class="screen">
    <div class="rcard">
      <div class="remoji" id="remoji">&#10022;</div>
      <div class="rtitle" id="rtitle">Quiz Complete!</div>
      <div class="rsub" id="rsub"></div>
      <div class="scircle" id="scircle">
        <div class="sinner">
          <div class="spct" id="spct">0%</div>
          <div class="slbl">Score</div>
        </div>
      </div>
      <div class="sgrid">
        <div class="sbox">
          <div class="sval g" id="sc">0</div>
          <div class="slb">Correct</div>
        </div>
        <div class="sbox">
          <div class="sval r" id="sw">0</div>
          <div class="slb">Wrong</div>
        </div>
        <div class="sbox">
          <div class="sval b" id="st">0</div>
          <div class="slb">Total</div>
        </div>
      </div>
      <div class="rbtns">
        <button class="btn-retry" onclick="retryQuiz()">Retry Quiz</button>
        <button class="btn-home" onclick="goHome()">Change Topic</button>
      </div>
      <div class="rev" id="rev"></div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="questions.js"></script>
  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let pool = [], current = [], idx = 0, score = 0, history = [], selTopics = new Set(), selWeeks = new Set(), mode = 'topic';

    // ── Week metadata ─────────────────────────────────────────────────────────
    const WEEK_INFO = {
      1: { label: 'History & Research Methods', icon: '<i data-lucide="scroll"></i>' },
      2: { label: 'Object Perception & Recognition', icon: '<i data-lucide="eye"></i>' },
      3: { label: 'Attention', icon: '<i data-lucide="target"></i>' },
      4: { label: 'Memory & Working Memory', icon: '<i data-lucide="brain"></i>' },
      5: { label: 'Long-Term Memory', icon: '<i data-lucide="book-open"></i>' },
      6: { label: 'Semantic Memory', icon: '<i data-lucide="network"></i>' },
      7: { label: 'Concepts & Categories', icon: '<i data-lucide="folder-open"></i>' },
      8: { label: 'Visual & Spatial Memory', icon: '<i data-lucide="image"></i>' },
      9: { label: 'Human Language Skills', icon: '<i data-lucide="message-square"></i>' },
      10: { label: 'Thought Processes & Problem Solving', icon: '<i data-lucide="puzzle"></i>' },
      11: { label: 'Reasoning', icon: '<i data-lucide="scale"></i>' },
      12: { label: 'Decision Making', icon: '<i data-lucide="dice-5"></i>' }
    };

    // ── Boot ───────────────────────────────────────────────────────────────────
    window.onload = () => { buildTopicGrid(); };

    function setMode(m) {
      mode = m;
      document.getElementById('mode-topic').classList.toggle('active', m === 'topic');
      document.getElementById('mode-week').classList.toggle('active', m === 'week');
      selTopics.clear(); selWeeks.clear();
      if (m === 'topic') buildTopicGrid(); else buildWeekGrid();
    }

    function buildTopicGrid() {
      const grid = document.getElementById('topic-grid');
      const topics = {};
      QUESTIONS.forEach(q => {
        if (!topics[q.topic]) topics[q.topic] = { icon: q.topicIcon, count: 0 };
        topics[q.topic].count++;
      });
      grid.innerHTML = '';
      const all = document.createElement('div');
      all.className = 'tc sel'; all.dataset.topic = '__all__';
      all.innerHTML = `<div class="ti"><i data-lucide="layers"></i></div><div class="tn">All Topics</div><div class="tq">${QUESTIONS.length} questions</div>`;
      all.onclick = () => toggleTopic(all, '__all__');
      grid.appendChild(all);
      selTopics.add('__all__');
      Object.entries(topics).forEach(([name, { icon, count }]) => {
        const d = document.createElement('div');
        d.className = 'tc'; d.dataset.topic = name;
        d.innerHTML = `<div class="ti">${icon}</div><div class="tn">${name}</div><div class="tq">${count} questions</div>`;
        d.onclick = () => toggleTopic(d, name);
        grid.appendChild(d);
      });
      setTimeout(() => lucide.createIcons(), 10);
    }

    function buildWeekGrid() {
      const grid = document.getElementById('topic-grid');
      grid.innerHTML = '';
      // Count questions per week
      const weekCounts = {};
      QUESTIONS.forEach(q => { weekCounts[q.week] = (weekCounts[q.week] || 0) + 1; });
      // All weeks card
      const all = document.createElement('div');
      all.className = 'tc sel'; all.dataset.week = '__all__';
      all.innerHTML = `<div class="ti"><i data-lucide="layers"></i></div><div class="tn">All Weeks</div><div class="tq">${QUESTIONS.length} questions</div>`;
      all.onclick = () => toggleWeek(all, '__all__');
      grid.appendChild(all);
      selWeeks.add('__all__');
      for (let w = 1; w <= 12; w++) {
        const info = WEEK_INFO[w];
        const d = document.createElement('div');
        d.className = 'tc'; d.dataset.week = String(w);
        d.innerHTML = `<div class="ti">${info.icon}</div><div class="tn">Week ${String(w).padStart(2, '0')}</div><div class="tq" style="margin-bottom:.3rem">${info.label}</div><div class="tq">${weekCounts[w] || 0} questions</div>`;
        d.onclick = () => toggleWeek(d, String(w));
        grid.appendChild(d);
      }
      setTimeout(() => lucide.createIcons(), 10);
    }

    function toggleTopic(el, name) {
      if (name === '__all__') {
        selTopics.clear(); selTopics.add('__all__');
        document.querySelectorAll('.tc').forEach(c => c.classList.remove('sel'));
        el.classList.add('sel');
      } else {
        const allCard = document.querySelector('[data-topic="__all__"]');
        if (selTopics.has('__all__')) { selTopics.delete('__all__'); allCard.classList.remove('sel'); }
        if (selTopics.has(name)) { selTopics.delete(name); el.classList.remove('sel'); }
        else { selTopics.add(name); el.classList.add('sel'); }
        if (selTopics.size === 0) { selTopics.add('__all__'); allCard.classList.add('sel'); }
      }
    }

    function toggleWeek(el, wk) {
      if (wk === '__all__') {
        selWeeks.clear(); selWeeks.add('__all__');
        document.querySelectorAll('.tc').forEach(c => c.classList.remove('sel'));
        el.classList.add('sel');
      } else {
        const allCard = document.querySelector('[data-week="__all__"]');
        if (selWeeks.has('__all__')) { selWeeks.delete('__all__'); allCard.classList.remove('sel'); }
        if (selWeeks.has(wk)) { selWeeks.delete(wk); el.classList.remove('sel'); }
        else { selWeeks.add(wk); el.classList.add('sel'); }
        if (selWeeks.size === 0) { selWeeks.add('__all__'); allCard.classList.add('sel'); }
      }
    }

    function startQuiz() {
      let filtered = [...QUESTIONS].sort(() => Math.random() - .5);
      if (mode === 'topic') {
        if (!selTopics.has('__all__')) filtered = filtered.filter(q => selTopics.has(q.topic));
      } else {
        if (!selWeeks.has('__all__')) filtered = filtered.filter(q => selWeeks.has(String(q.week)));
      }
      if (!filtered.length) { alert('No questions match your selection. Try a different ' + mode + '.'); return; }
      pool = filtered;
      current = [...pool]; idx = 0; score = 0; history = [];
      document.getElementById('qt').textContent = current.length;
      show('quiz'); loadQ();
    }

    function loadQ() {
      const q = current[idx];
      document.getElementById('qc').textContent = idx + 1;
      document.getElementById('qtopic').innerHTML = q.topicIcon + ' ' + q.topic;
      document.getElementById('qlabel').innerHTML = q.topicIcon + ' ' + q.topic + (mode === 'week' ? ' • Week ' + String(q.week).padStart(2, '0') : '');
      document.getElementById('qtext').textContent = q.q;
      document.getElementById('pb').style.width = ((idx / current.length) * 100) + '%';
      document.getElementById('lscore').textContent = score;
      document.getElementById('expl').className = 'expl';
      document.getElementById('btn-next').className = 'btn-next';
      // Shuffle options: create index array, shuffle it, track new correct index
      const order = [0,1,2,3].sort(() => Math.random() - .5);
      const shuffledOpts = order.map(i => q.opts[i]);
      const shuffledAns = order.indexOf(q.ans);
      const optsEl = document.getElementById('opts');
      optsEl.innerHTML = '';
      const labels = ['A', 'B', 'C', 'D'];
      shuffledOpts.forEach((o, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.innerHTML = `<span class="ol">${labels[i]}</span>${o}`;
        btn.onclick = () => answer(i, shuffledAns, order, q);
        optsEl.appendChild(btn);
      });
      setTimeout(() => lucide.createIcons(), 10);
    }

    function answer(i, correctIdx, order, q) {
      disableOpts();
      const btns = document.querySelectorAll('.opt');
      const correct = i === correctIdx;
      btns[i].classList.add(correct ? 'correct' : 'wrong');
      if (!correct) btns[correctIdx].classList.add('correct');
      if (correct) score++;
      document.getElementById('lscore').textContent = score;
      showExpl(q);
      // Store the original option index for review display
      history.push({ q, chosen: order[i], correct });
      document.getElementById('btn-next').className = 'btn-next show';
    }

    function disableOpts() { document.querySelectorAll('.opt').forEach(b => b.disabled = true); }
    function showExpl(q) { const e = document.getElementById('expl'); e.textContent = q.expl; e.className = 'expl show'; }

    function nextQ() { idx++; if (idx >= current.length) showResult(); else loadQ(); }

    function showResult() {
      const pct = Math.round((score / current.length) * 100);
      document.getElementById('spct').textContent = pct + '%';
      document.getElementById('sc').textContent = score;
      document.getElementById('sw').textContent = current.length - score;
      document.getElementById('st').textContent = current.length;
      let emoji = '<i data-lucide="party-popper" style="width:64px;height:64px;stroke-width:1"></i>', title = 'Quiz Complete!', sub = '';
      if (pct >= 90) { emoji = '<i data-lucide="award" style="width:64px;height:64px;stroke-width:1"></i>'; title = 'Outstanding!'; sub = 'You\'re a cognitive psychology expert!'; }
      else if (pct >= 75) { emoji = '<i data-lucide="star" style="width:64px;height:64px;stroke-width:1"></i>'; title = 'Great Job!'; sub = 'Solid understanding of the material.'; }
      else if (pct >= 60) { emoji = '<i data-lucide="thumbs-up" style="width:64px;height:64px;stroke-width:1"></i>'; title = 'Good Effort!'; sub = 'Keep reviewing and you\'ll master it.'; }
      else if (pct >= 40) { emoji = '<i data-lucide="book-open" style="width:64px;height:64px;stroke-width:1"></i>'; title = 'Keep Studying!'; sub = 'Review the lectures and try again.'; }
      else { emoji = '<i data-lucide="battery-charging" style="width:64px;height:64px;stroke-width:1"></i>'; title = 'Don\'t Give Up!'; sub = 'Go back to the transcripts and try again.'; }
      document.getElementById('remoji').textContent = emoji;
      document.getElementById('rtitle').textContent = title;
      document.getElementById('rsub').textContent = sub + ' (' + pct + '%)';
      const sc = document.getElementById('scircle');
      sc.style.background = `conic-gradient(var(--accent) ${pct * 3.6}deg, var(--border) 0deg)`;
      const rev = document.getElementById('rev');
      rev.innerHTML = '<div class="rev-title">Review</div>';
      history.forEach(({ q, chosen, correct }) => {
        const d = document.createElement('div');
        d.className = 'ri ' + (correct ? 'c' : 'w');
        d.innerHTML = `<div class="riq">${q.topicIcon} ${q.q}</div><div class="ria"><span class="ya">Your answer: ${q.opts[chosen]}</span> &nbsp;|&nbsp; <span class="ca">Correct: ${q.opts[q.ans]}</span></div>`;
        rev.appendChild(d);
      });
      show('result');
      setTimeout(() => lucide.createIcons(), 10);
    }

    function retryQuiz() { idx = 0; score = 0; history = []; current = [...pool].sort(() => Math.random() - .5); show('quiz'); loadQ(); }
    function goHome() { show('home'); }
    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // Fluid Blobs & Cursor Logic
    const cursor = document.querySelector('.custom-cursor');
    const dot = document.querySelector('.custom-cursor-dot');
    const blobs = document.querySelectorAll('.fluid-blob');
    
    const blobsData = [
      { depth: 0.08, delay: 0 },
      { depth: -0.05, delay: 0.1 },
      { depth: 0.04, delay: 0.2 },
      { depth: 0.02, delay: 0.15 },
      { depth: 0.1, delay: 0.05 },
    ];

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      gsap.to(dot, { x: mouseX, y: mouseY, duration: 0 });
      gsap.to(cursor, { x: mouseX, y: mouseY, duration: 0.6, ease: "power2.out" });
    });

    gsap.set([cursor, dot], { x: mouseX, y: mouseY, xPercent: -50, yPercent: -50 });

    gsap.ticker.add(() => {
      blobs.forEach((blob, index) => {
        const data = blobsData[index];
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const targetX = (mouseX - cx) * data.depth;
        const targetY = (mouseY - cy) * data.depth;

        gsap.to(blob, {
          x: targetX,
          y: targetY,
          duration: 2.5 + data.delay,
          ease: "power2.out",
          overwrite: "auto"
        });
      });
    });

    blobs.forEach((blob, i) => {
      gsap.to(blob, {
        rotation: 360,
        scaleX: i % 2 === 0 ? 1.1 : 0.9,
        scaleY: i % 2 === 0 ? 0.9 : 1.1,
        duration: 15 + i * 2,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut"
      });
    });
  </script>
