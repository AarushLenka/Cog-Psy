<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Psychology Quiz</title>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--accent:#e94560;--text:#eaeaea;--muted:#a0a0b0;--correct:#00b894;--wrong:#e17055;--border:#2a2a4a;--glow:rgba(233,69,96,0.3);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 50%,rgba(83,52,131,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(233,69,96,.1) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(15,52,96,.2) 0%,transparent 50%);animation:bgP 8s ease-in-out infinite alternate;pointer-events:none;z-index:0;}
@keyframes bgP{0%{transform:scale(1) rotate(0deg);}100%{transform:scale(1.1) rotate(3deg);}}
.screen{position:relative;z-index:1;}
#home,#quiz,#result{display:none;min-height:100vh;}
#home.active,#quiz.active,#result.active{display:flex;}
/* HOME */
#home{flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.logo-icon{font-size:4rem;display:block;margin-bottom:.5rem;filter:drop-shadow(0 0 20px var(--accent));animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,#a855f7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:.5rem;}
.subtitle{color:var(--muted);font-size:1.1rem;margin-bottom:2.5rem;}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;max-width:900px;width:100%;margin-bottom:2rem;}
.tc{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1.2rem;cursor:pointer;transition:all .3s;}
.tc:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 25px var(--glow);}
.tc.sel{border-color:var(--accent);background:rgba(233,69,96,.1);box-shadow:0 0 20px var(--glow);}
.tc .ti{font-size:1.8rem;margin-bottom:.4rem;}
.tc .tn{font-weight:600;font-size:.9rem;}
.tc .tq{color:var(--muted);font-size:.78rem;margin-top:.2rem;}
.settings-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:2rem;max-width:600px;width:100%;}
.sg{display:flex;flex-direction:column;gap:.4rem;}
.sg label{font-size:.82rem;color:var(--muted);}
.sg select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem 1rem;border-radius:8px;font-size:.9rem;cursor:pointer;outline:none;}
.sg select:focus{border-color:var(--accent);}
.btn-start{background:linear-gradient(135deg,var(--accent),#a855f7);color:#fff;border:none;padding:1rem 3rem;font-size:1.1rem;font-weight:700;border-radius:50px;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px var(--glow);}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--glow);}
/* QUIZ */
#quiz{flex-direction:column;padding:1.5rem;max-width:800px;margin:0 auto;width:100%;}
.qhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem;}
.qmeta{display:flex;gap:1rem;align-items:center;}
.badge{background:var(--surface);border:1px solid var(--border);padding:.4rem .9rem;border-radius:20px;font-size:.82rem;color:var(--muted);}
.badge span{color:var(--text);font-weight:600;}
.tbadge{background:var(--surface);border:1px solid var(--border);padding:.4rem .9rem;border-radius:20px;font-size:.9rem;font-weight:700;transition:all .3s;}
.tbadge.warn{border-color:#fdcb6e;color:#fdcb6e;}
.tbadge.danger{border-color:var(--wrong);color:var(--wrong);animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.pbwrap{background:var(--surface);border-radius:10px;height:6px;margin-bottom:2rem;overflow:hidden;}
.pb{height:100%;background:linear-gradient(90deg,var(--accent),#a855f7);border-radius:10px;transition:width .4s ease;}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#a855f7);}
.qtopic{font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:.8rem;font-weight:600;}
.qtext{font-size:1.1rem;line-height:1.6;font-weight:500;}
.opts{display:grid;gap:.8rem;margin-bottom:1.5rem;}
.opt{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:.9rem 1.1rem;border-radius:12px;cursor:pointer;text-align:left;font-size:.92rem;transition:all .25s;display:flex;align-items:center;gap:.8rem;line-height:1.4;}
.opt:hover:not(:disabled){border-color:var(--accent);background:rgba(233,69,96,.08);transform:translateX(4px);}
.ol{min-width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;flex-shrink:0;transition:all .25s;}
.opt:hover:not(:disabled) .ol{background:var(--accent);border-color:var(--accent);color:#fff;}
.opt.correct{border-color:var(--correct);background:rgba(0,184,148,.12);}
.opt.correct .ol{background:var(--correct);border-color:var(--correct);color:#fff;}
.opt.wrong{border-color:var(--wrong);background:rgba(225,112,85,.12);}
.opt.wrong .ol{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.opt:disabled{cursor:default;}
.expl{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:1rem 1.2rem;font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem;display:none;}
.expl.show{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.qftr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;}
.slive{font-size:.88rem;color:var(--muted);}
.slive span{color:var(--correct);font-weight:700;}
.btn-next{background:linear-gradient(135deg,var(--accent),#a855f7);color:#fff;border:none;padding:.7rem 2rem;border-radius:50px;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .3s;display:none;}
.btn-next.show{display:block;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 4px 15px var(--glow);}
/* RESULT */
#result{flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;max-width:640px;width:100%;position:relative;overflow:hidden;text-align:center;}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),#a855f7,var(--correct));}
.remoji{font-size:4rem;margin-bottom:1rem;animation:bounce .6s ease;}
@keyframes bounce{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
.rtitle{font-size:1.8rem;font-weight:800;margin-bottom:.5rem;}
.rsub{color:var(--muted);margin-bottom:2rem;}
.scircle{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;position:relative;}
.scircle::before{content:'';position:absolute;inset:10px;border-radius:50%;background:var(--surface);}
.sinner{position:relative;z-index:1;text-align:center;}
.spct{font-size:2rem;font-weight:800;color:var(--accent);}
.slbl{font-size:.72rem;color:var(--muted);}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.sbox{background:var(--surface2);border-radius:12px;padding:1rem;}
.sval{font-size:1.5rem;font-weight:800;}
.sval.g{color:var(--correct);}
.sval.r{color:var(--wrong);}
.sval.b{color:#74b9ff;}
.slb{font-size:.72rem;color:var(--muted);margin-top:.2rem;}
.rbtns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem;}
.btn-retry{background:linear-gradient(135deg,var(--accent),#a855f7);color:#fff;border:none;padding:.8rem 2rem;border-radius:50px;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px var(--glow);}
.btn-retry:hover{transform:translateY(-2px);}
.btn-home{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:.8rem 2rem;border-radius:50px;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .3s;}
.btn-home:hover{border-color:var(--accent);}
.rev{margin-top:1.5rem;text-align:left;}
.rev-title{font-size:.85rem;font-weight:700;margin-bottom:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.ri{background:var(--surface2);border-radius:10px;padding:.9rem;margin-bottom:.7rem;border-left:3px solid var(--border);}
.ri.c{border-left-color:var(--correct);}
.ri.w{border-left-color:var(--wrong);}
.riq{font-size:.85rem;margin-bottom:.4rem;}
.ria{font-size:.78rem;color:var(--muted);}
.ria .ya{color:var(--wrong);}
.ria .ca{color:var(--correct);}
@media(max-width:600px){.qtext{font-size:.98rem;}.opt{font-size:.85rem;padding:.75rem .9rem;}}
</style>
</head>
<body>
<!-- HOME -->
<div id="home" class="screen active">
  <span class="logo-icon">&#129504;</span>
  <h1>Cognitive Psychology Quiz</h1>
  <p class="subtitle">250 questions across 14 topics — 30 lectures of cognitive science</p>
  <div class="topic-grid" id="topic-grid"></div>
  <div class="settings-row">
    <div class="sg"><label>Questions</label>
      <select id="num-q"><option value="10">10</option><option value="20" selected>20</option><option value="30">30</option><option value="50">50</option><option value="all">All</option></select></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Start Quiz &#10022;</button>
</div>
<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="qhdr">
    <div class="qmeta">
      <div class="badge">Q <span id="qc">1</span> / <span id="qt">20</span></div>
      <div class="badge">Topic: <span id="qtopic">-</span></div>
    </div>
    <div class="tbadge" id="tdisp" style="display:none"></div>
  </div>
  <div class="pbwrap"><div class="pb" id="pb" style="width:0%"></div></div>
  <div class="qcard">
    <div class="qtopic" id="qlabel"></div>
    <div class="qtext" id="qtext"></div>
  </div>
  <div class="opts" id="opts"></div>
  <div class="expl" id="expl"></div>
  <div class="qftr">
    <div class="slive">Score: <span id="lscore">0</span> correct</div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">Next &#8594;</button>
  </div>
</div>
<!-- RESULT -->
<div id="result" class="screen">
  <div class="rcard">
    <div class="remoji" id="remoji">&#127881;</div>
    <div class="rtitle" id="rtitle">Quiz Complete!</div>
    <div class="rsub" id="rsub"></div>
    <div class="scircle" id="scircle"><div class="sinner"><div class="spct" id="spct">0%</div><div class="slbl">Score</div></div></div>
    <div class="sgrid">
      <div class="sbox"><div class="sval g" id="sc">0</div><div class="slb">Correct</div></div>
      <div class="sbox"><div class="sval r" id="sw">0</div><div class="slb">Wrong</div></div>
      <div class="sbox"><div class="sval b" id="st">0</div><div class="slb">Total</div></div>
    </div>
    <div class="rbtns">
      <button class="btn-retry" onclick="retryQuiz()">Retry Quiz</button>
      <button class="btn-home" onclick="goHome()">Change Topic</button>
    </div>
    <div class="rev" id="rev"></div>
  </div>
</div>

<script src="questions.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let pool=[], current=[], idx=0, score=0, history=[], selTopics=new Set();

// ── Boot ───────────────────────────────────────────────────────────────────
window.onload=()=>{buildTopicGrid();};

function buildTopicGrid(){
  const grid=document.getElementById('topic-grid');
  const topics={};
  QUESTIONS.forEach(q=>{
    if(!topics[q.topic]) topics[q.topic]={icon:q.topicIcon,count:0};
    topics[q.topic].count++;
  });
  grid.innerHTML='';
  const all=document.createElement('div');
  all.className='tc sel'; all.dataset.topic='__all__';
  all.innerHTML=`<div class="ti">🧠</div><div class="tn">All Topics</div><div class="tq">${QUESTIONS.length} questions</div>`;
  all.onclick=()=>toggleTopic(all,'__all__');
  grid.appendChild(all);
  selTopics.add('__all__');
  Object.entries(topics).forEach(([name,{icon,count}])=>{
    const d=document.createElement('div');
    d.className='tc'; d.dataset.topic=name;
    d.innerHTML=`<div class="ti">${icon}</div><div class="tn">${name}</div><div class="tq">${count} questions</div>`;
    d.onclick=()=>toggleTopic(d,name);
    grid.appendChild(d);
  });
}

function toggleTopic(el,name){
  if(name==='__all__'){
    selTopics.clear(); selTopics.add('__all__');
    document.querySelectorAll('.tc').forEach(c=>c.classList.remove('sel'));
    el.classList.add('sel');
  } else {
    const allCard=document.querySelector('[data-topic="__all__"]');
    if(selTopics.has('__all__')){selTopics.delete('__all__');allCard.classList.remove('sel');}
    if(selTopics.has(name)){selTopics.delete(name);el.classList.remove('sel');}
    else{selTopics.add(name);el.classList.add('sel');}
    if(selTopics.size===0){selTopics.add('__all__');allCard.classList.add('sel');}
  }
}

function startQuiz(){
  const numQ=document.getElementById('num-q').value;
  let filtered=[...QUESTIONS].sort(()=>Math.random()-.5);
  if(!selTopics.has('__all__')) filtered=filtered.filter(q=>selTopics.has(q.topic));
  if(!filtered.length){alert('No questions match your selection. Try a different topic.');return;}
  pool=numQ==='all'?filtered:filtered.slice(0,Math.min(parseInt(numQ),filtered.length));
  current=[...pool]; idx=0; score=0; history=[];
  document.getElementById('qt').textContent=current.length;
  show('quiz'); loadQ();
}

function loadQ(){
  const q=current[idx];
  document.getElementById('qc').textContent=idx+1;
  document.getElementById('qtopic').textContent=q.topicIcon+' '+q.topic;
  document.getElementById('qlabel').textContent=q.topicIcon+' '+q.topic;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('pb').style.width=((idx/current.length)*100)+'%';
  document.getElementById('lscore').textContent=score;
  document.getElementById('expl').className='expl';
  document.getElementById('btn-next').className='btn-next';
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  const labels=['A','B','C','D'];
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="ol">${labels[i]}</span>${o}`;
    btn.onclick=()=>answer(i,q);
    opts.appendChild(btn);
  });
}

function answer(i,q){
  disableOpts();
  const btns=document.querySelectorAll('.opt');
  const correct=i===q.ans;
  btns[i].classList.add(correct?'correct':'wrong');
  if(!correct) btns[q.ans].classList.add('correct');
  if(correct) score++;
  document.getElementById('lscore').textContent=score;
  showExpl(q); history.push({q,chosen:i,correct});
  document.getElementById('btn-next').className='btn-next show';
}

function disableOpts(){document.querySelectorAll('.opt').forEach(b=>b.disabled=true);}
function showExpl(q){const e=document.getElementById('expl');e.textContent=q.expl;e.className='expl show';}

function nextQ(){idx++;if(idx>=current.length) showResult();else loadQ();}

function showResult(){
  const pct=Math.round((score/current.length)*100);
  document.getElementById('spct').textContent=pct+'%';
  document.getElementById('sc').textContent=score;
  document.getElementById('sw').textContent=current.length-score;
  document.getElementById('st').textContent=current.length;
  let emoji='🎉',title='Quiz Complete!',sub='';
  if(pct>=90){emoji='🏆';title='Outstanding!';sub='You\'re a cognitive psychology expert!';}
  else if(pct>=75){emoji='🌟';title='Great Job!';sub='Solid understanding of the material.';}
  else if(pct>=60){emoji='👍';title='Good Effort!';sub='Keep reviewing and you\'ll master it.';}
  else if(pct>=40){emoji='📖';title='Keep Studying!';sub='Review the lectures and try again.';}
  else{emoji='💪';title='Don\'t Give Up!';sub='Go back to the transcripts and try again.';}
  document.getElementById('remoji').textContent=emoji;
  document.getElementById('rtitle').textContent=title;
  document.getElementById('rsub').textContent=sub+' ('+pct+'%)';
  const sc=document.getElementById('scircle');
  sc.style.background=`conic-gradient(var(--accent) ${pct*3.6}deg, var(--border) 0deg)`;
  const rev=document.getElementById('rev');
  rev.innerHTML='<div class="rev-title">Review</div>';
  history.forEach(({q,chosen,correct})=>{
    const d=document.createElement('div');
    d.className='ri '+(correct?'c':'w');
    d.innerHTML=`<div class="riq">${q.topicIcon} ${q.q}</div><div class="ria"><span class="ya">Your answer: ${q.opts[chosen]}</span> &nbsp;|&nbsp; <span class="ca">Correct: ${q.opts[q.ans]}</span></div>`;
    rev.appendChild(d);
  });
  show('result');
}

function retryQuiz(){idx=0;score=0;history=[];current=[...pool].sort(()=>Math.random()-.5);show('quiz');loadQ();}
function goHome(){show('home');}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
</script>
</body>
</html>
